<ion-content [fullscreen]="true" class="custom-bg">
  <div class="auth-wrapper">
    
    <div class="hero-section">
      <div class="circle-bg"></div>
      <ion-icon name="heart-half-outline" class="welcome-icon"></ion-icon>
    </div>

    <div class="text-section">
      <h1>Your Health Journey Starts Here</h1>
      <p>Log in or create an account to personalize your experience and track your progress.</p>
    </div>

    <div class="action-buttons">
      <ion-button expand="block" class="login-btn">
        LOG IN
      </ion-button>
      
      <ion-button expand="block" fill="outline" class="signup-btn">
        SIGN UP
      </ion-button>
    </div>

    <div class="footer-text">
      <p>By continuing, you agree to our <span>Terms of Service</span></p>
    </div>
  </div>
</ion-content>
